<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Identity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/create-identity">Create Identity</a>
            <a href="/manage-identities">Manage Identities</a>
            <a href="/verify-identity">Verify Identity</a>
            <a href="/api-docs">API Docs</a>
        </nav>
    </header>
    <main class="container">
        <h1 class="mt-5">Create a New Identity</h1>
        <form id="create-identity-form">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" required>
            </div>
            <div class="mb-3">
                <label for="did" class="form-label">Decentralized Identifier (DID)</label>
                <input type="text" class="form-control" id="did" required>
            </div>
            <button type="submit" class="btn btn-primary">Create Identity</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2023 Decentralized Identity Management System</p>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
